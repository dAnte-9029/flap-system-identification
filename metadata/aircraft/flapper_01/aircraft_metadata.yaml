schema_version: aircraft_metadata_v0.1
aircraft_id: flapper_01
configuration_id: flapper_01_elevon_rudder_v1
status: draft_in_use

description: >
  Symmetric flapping main wings, twin elevon tail, single rudder, physical airspeed
  sensor, RTK-capable GNSS.

px4_firmware:
  repo_path: /home/zn/PX4-Autopilot
  branch_or_tag: air
  commit: 64d88ae4a9d1f4a924b18995ee72fbb1d19787e6

frames:
  body_frame: FRD
  local_frame: NED
  body_reference_origin: imu_origin
  cg_reference_origin: imu_origin

log_coverage:
  has_logged_wing_phase_topic: true
  has_logged_absolute_drive_phase_topic: false
  current_good_log_notes: >
    Current 2026.4.12 good logs contain wing_phase in addition to encoder_count, rpm,
    debug_vect, and flap_frequency. Older 2026.4.9 and 2026.4.10 good logs do not contain a
    standalone absolute_drive_phase topic and may rely on encoder-based phase fallback.

mass_properties:
  mass_kg:
    value: 0.90415
    unit: kg
    status: measured_combined_neutral_wings
    source: body_four_point_weighing_plus_measured_right_wing_mirrored_left_wing
    uncertainty: pending_repeatability_summary
  cg_b_m:
    value: [-0.12154, 0.00541, -0.04298]
    unit: m
    status: measured_combined_neutral_wings_relative_to_imu_origin
    source: >
      combined body_plus_two_wings CG in U_FRD is [-0.12154, 0.00541, -0.01298] m;
      IMU origin in U_FRD is approximated as [0.0, 0.0, 0.030] m, with xy
      offset neglected because the CG projection lies inside the flight-controller footprint.
    uncertainty: [pending, pending, pending]
  inertia_b_kg_m2:
    value:
      - [0.02329, 0.0, 0.0]
      - [0.0, 0.02573, 0.0]
      - [0.0, 0.0, 0.04270]
    unit: kg*m^2
    status: measured_and_combined_neutral_wings_diagonal_approximation
    source: >
      body bifilar measurements plus mirrored right-wing mass properties, combined about
      the neutral-wing whole-aircraft CG with the parallel-axis theorem; off-diagonal
      products of inertia are neglected for the current low-dimensional label model.
    uncertainty: pending_repeatability_and_wing_inertia_estimation_summary

flapping_drive:
  ratio_contract_version: ratio8_v1
  ratio_source: confirmed_physical_hardware
  phase_contract_version: hall_indexed_mechanical_phase_ratio8_v1
  frequency_contract_version: flap_frequency_ratio8_v1
  encoder_sensor: AS5600
  encoder_location: upstream_gear
  absolute_phase_reference_sensor: hall_index_on_drive_gear
  encoder_counts_per_rev: 4096
  encoder_to_drive_ratio:
    value: 8.0
    unit: encoder_rad_per_drive_rad
    status: confirmed
    source: user_confirmed_updated_mechanical_ratio
  encoder_to_drive_sign:
    value: 1.0
    status: user_confirmed_and_data_consistent
    source: encoder_count_increases_with_drive_phase
  drive_phase_zero_definition: sine_argument_zero_crossing
  drive_phase_zero_offset_rad:
    value: 0.0
    unit: rad
    status: user_confirmed_and_data_consistent
    source: neutral_wing_starting_upstroke
  phase_calibration_method: as5600_relative_angle_plus_hall_index_on_drive_gear
  phase_logging_status: wing_phase_seen_but_absolute_drive_phase_not_logged
  positive_wing_stroke_direction: upstroke
  wing_stroke_model: sinusoidal_from_drive_phase
  wing_stroke_amplitude_rad:
    value: 0.5235987756
    unit: rad
    status: confirmed
    source: user_stated_30_deg_amplitude
  wing_stroke_phase_offset_rad:
    value: 0.0
    unit: rad
    status: confirmed
    source: user_defined_phase_convention
  phase_interval_interpretation:
    upstroke_deg:
      - [0, 90]
      - [270, 360]
    downstroke_deg:
      - [90, 270]
  mechanism_notes: >
    Drive phase increases with upstroke positive. The wing stroke angle is defined as
    theta_wing = 30 deg * sin(phi_drive). Drive phase zero is the sine-argument zero
    crossing. Theta increase means upstroke, theta decrease means downstroke.

actuators:
  motor_cmd_0:
    topic: actuator_motors.control[0]
    semantics: flapping_drive_command
  left_elevon:
    topic: actuator_servos.control[0]
    positive_deflection: null
    neutral_trim_norm: 0.0
  right_elevon:
    topic: actuator_servos.control[1]
    positive_deflection: null
    neutral_trim_norm: 0.0
  rudder:
    topic: actuator_servos.control[2]
    positive_deflection: null
    neutral_trim_norm: 0.0

sensors:
  airspeed_sensor_present: true
  expected_airspeed_source: SOURCE_SENSOR_1
  rtk_absolute_expected: true
  moving_baseline_expected: false

label_definition:
  gravity_m_s2: 9.81
  force_definition: effective_non_gravity_external_force
  moment_definition: effective_external_moment_about_cg
  cg_correction_enabled: false
  time_varying_inertia_mode: ignored_in_v0_1

open_items:
  - field: actuators.left_elevon.positive_deflection
    reason: required_for_control_input_semantics
  - field: actuators.right_elevon.positive_deflection
    reason: required_for_control_input_semantics
  - field: actuators.rudder.positive_deflection
    reason: required_for_control_input_semantics
