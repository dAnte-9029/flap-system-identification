    generator_commit: 9e8aaa06c5be74cce0073809543da0e306fab975
    storage: git_lfs
    key_columns: [log_id, timestamp_us]
    partitions:
      included: [train, validation]
      excluded: [test]
      test_labels_loaded: false
    sample_counts:
      train: 308702
      validation: 79587
    phase_contract:
      column: mechanical_phase_rad
      range: "[0, 2*pi)"
      zero: Hall event, neutral wing position starting upstroke
      counts_per_encoder_revolution: 4096
      true_ratio: 8.0
      counts_per_wing_cycle: 32768
      primary_method: Hall timestamp plus interpolated encoder total_count
      fallback_method: Hall zero count recovered from logged phase, then inverted on encoder total_count
    frequency_contract:
      column: flap_frequency_hz
      formula: logged_flap_frequency_hz * 7.5 / 8.0
      logged_ratio: 7.5
      true_ratio: 8.0
    artifact_sha256:
      train_samples.parquet: b0ee4d524bf8d952f3f3c328ac49c7d6928412141a0e7ecffdf42f0d60e21e3c
      val_samples.parquet: e4c72ce1d78712a695206ad6b2bd4eb8b03bc7d49386a0c7e0276ee3bbfb014d

policy:
  new_experiments_must_use_default: true
  infer_authority_from_directory_date: false
  silent_fallback_allowed: false
  historical_reproduction_requires_explicit_dataset_id: true
  superseded_for_new_experiments:
