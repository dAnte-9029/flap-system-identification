schema_version: canonical_dataset_registry_v1
default_dataset_id: canonical_v0.3_training_ready_split_measured_massprops_hall_ratio8_sg0p03_trainval_v2

datasets:
  canonical_v0.3_training_ready_split_measured_massprops_hall_ratio8_sg0p03_trainval_v2:
    lifecycle_status: active
    intended_use: all_new_experiments_requiring_canonical_flight_samples
    repository_relative_root: dataset/canonical_v0.3_training_ready_split_measured_massprops_hall_ratio8_sg0p03_trainval_v2
    manifest_path: dataset/canonical_v0.3_training_ready_split_measured_massprops_hall_ratio8_sg0p03_trainval_v2/dataset_manifest.json
